<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Trải nghiệm AR - Sensory Research</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f1f1f1; font-family: 'Segoe UI', sans-serif; }
        model-viewer { 
            width: 100%; 
            height: 100vh; /* Tăng diện tích hiển thị để kích thích thị giác */
            background-color: #ffffff; 
            --poster-color: transparent;
        }
        .instructions { 
            position: absolute; top: 20px; width: 100%; z-index: 10;
            text-align: center; color: #444; font-size: 14px; 
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div class="instructions">Dùng ngón tay xoay để soi chi tiết chất liệu</div>

    <model-viewer 
        src="orange_bag.glb" 
        ios-src="orange_bag.usdz"
        alt="Túi xách cao cấp - Orange Edition"
        
        /* TỐI ƯU ÁNH SÁNG & CẢM GIÁC XÚC GIÁC */
        exposure="1.5" 
        shadow-intensity="0.5" 
        shadow-softness="1"
        camera-orbit="45deg 75deg auto"
        environment-image="legacy" 
        tone-mapping="commerce"
        
        /* CẤU HÌNH AR QUYẾT LIỆT */
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="auto"
        camera-controls 
        auto-rotate 
        interaction-prompt="auto"
        touch-action="pan-y">
        
        <button slot="ar-button" style="background-color: #000; color: white; border-radius: 8px; border: none; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 16px 32px; font-size: 14px; font-weight: 600; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(0,0,0,0.15);">
            THỬ TRONG KHÔNG GIAN CỦA BẠN
        </button>
    </model-viewer>
</body>
</html>
