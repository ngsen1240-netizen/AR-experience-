<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Trải nghiệm AR - Sensory Research</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f8f8f8; font-family: 'Segoe UI', sans-serif; }
        model-viewer { width: 100%; height: 92vh; background-color: #ffffff; }
        .instructions { padding: 12px; text-align: center; background: #222; color: #fff; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="instructions">Xoay để xem chất liệu túi. Nhấn nút bên dưới để đặt túi trên bàn của bạn.</div>

    <model-viewer 
        src="orange_bag.glb" 
        ios-src="orange_bag.usdz"
        alt="Túi xách cao cấp - Orange Edition"
        
        exposure="1.2" 
        shadow-intensity="1.5"
        shadow-softness="0.5"
        environment-image="neutral"
        tone-mapping="commerce"
        
        camera-controls 
        auto-rotate 
        interaction-prompt="auto"
        ar 
        ar-modes="webxr scene-viewer quick-look">
        
        <button slot="ar-button" style="background-color: #ff6600; color: white; border-radius: 25px; border: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
          👜 XEM TRONG KHÔNG GIAN THỰC (AR)
        </button>
    </model-viewer>
</body>
</html>
